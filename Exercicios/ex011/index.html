<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias</title>
</head>
<body>
    <h1>imagens dinâmicas</h1>
    <p>tente abrir esse site em varios dispositivos diferentes ou simplismente aumente e diminua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width:750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="imagem flexivel">
    </picture>
    <h1>Reproduzindo audio</h1>
    <p>vamos aprender a reproduzir audio em HTML5</p>
    <audio preload="metadata" controls loop>
        <source src="midia/Neon nights - Patrick Patrikios.mp3" type="audio/mpeg">
        <source src="midia/Neon nights - Patrick Patrikios.mp3" type="ogg">
        <source src="midia/Neon nights - Patrick Patrikios.mp3" type="wav">
        <p>infelizmente seu navegador não consegue reproduzir audios, <a href="midia/Neon nights - Patrick Patrikios.mp3">clique aqui para baixar o arquivo mp3</a></p>
    </audio>
</body>
</html>
