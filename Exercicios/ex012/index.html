<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>inserindo videos hospedados localmente</h1>
    <p>este video esta hospedado no meu proprio servidor</p>
    <video poster="imagens/images.png" width="500" height="200" controls>
    <source src="midia/Meu-Video.mkv" type="video/mp4">
    <source src="midia/Meu-Video.webm" type="video/webm">
    <source src="midia/Meu-Video.ogv" type="video/ogv">
    <source src="midia/meu-video.mp4" type="video/mp4">
    <p>seu navegador não tem compatibilidade com reprodução de videos </p>
    </video>
    <h1>inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/3hng-hmSv2Y?si=BsR4dXAZ1MYKzSc6" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <h1>inserindo videos do vimeo</h1>
    <iframe src="https://player.vimeo.com/video/164046875?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="565" height="318" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="WAVES"></iframe>
</body>
</html>
